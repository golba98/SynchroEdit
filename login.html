<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SynchroEdit - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Force dark mode */
        html {
            color-scheme: dark;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .login-container {
            background: #0d0d0d;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(139, 92, 246, 0.4), 0 0 80px rgba(167, 139, 250, 0.2);
            border: 1px solid #2a2a2a;
            display: flex;
            width: 900px;
            height: 550px;
            overflow: hidden;
        }

        .left-section {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #000000;
        }

        .title {
            font-size: 36px;
            font-weight: bold;
            color: #a78bfa;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(167, 139, 250, 0.6);
        }

        .subtitle {
            font-size: 14px;
            color: #b0b0b0;
            margin-bottom: 50px;
        }

        .input-group {
            margin-bottom: 25px;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #e0e0e0;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            font-size: 14px;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            border-radius: 8px;
            outline: none;
            transition: all 0.3s;
            color: #e0e0e0;
        }

        .input-group input:focus {
            background: #0d0d0d;
            border-color: #8b5cf6;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
        }

        .input-group input::placeholder {
            color: #6b7280;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 38px;
            cursor: pointer;
            font-size: 16px;
            color: #b0b0b0;
            user-select: none;
            transition: color 0.3s;
            z-index: 10;
        }

        .password-toggle:hover {
            color: #e0e0e0;
        }

        .password-toggle i {
            pointer-events: none;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: #8b5cf6;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
            box-shadow: 0 0 25px rgba(139, 92, 246, 0.4);
        }

        .login-btn:hover {
            background: #a78bfa;
            box-shadow: 0 0 35px rgba(167, 139, 250, 0.6);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .status-message {
            margin-top: 15px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
        }

        .status-message.success {
            color: #4CAF50;
        }

        .status-message.error {
            color: #f44336;
        }

        .right-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000000;
            position: relative;
        }

        .character-container {
            position: relative;
            width: 300px;
            height: 400px;
            z-index: 1000;
        }

        .character {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .head {
            width: 140px;
            height: 140px;
            background: #1a1a1a;
            border-radius: 50%;
            border: 4px solid #8b5cf6;
            position: relative;
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
        }

        .eyes {
            position: absolute;
            top: 45px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 35px;
        }

        .eye {
            width: 18px;
            height: 22px;
            background: #e0e0e0;
            border-radius: 50%;
            position: relative;
            transition: all 0.3s;
        }

        .pupil {
            width: 7px;
            height: 7px;
            background: #8b5cf6;
            border-radius: 50%;
            position: absolute;
            top: 6px;
            left: 5px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .eyebrows {
            position: absolute;
            top: 32px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 35px;
        }

        .eyebrow {
            width: 28px;
            height: 3px;
            background: #e0e0e0;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .mouth {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            width: 55px;
            height: 28px;
            border: 3px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 55px 55px;
            transition: all 0.3s;
        }

        .blush {
            position: absolute;
            width: 16px;
            height: 11px;
            background: #a78bfa;
            border-radius: 50%;
            top: 68px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .blush.left {
            left: 12px;
        }

        .blush.right {
            right: 12px;
        }

        /* Character emotions */
        .character.happy .mouth {
            border-radius: 0 0 55px 55px;
            width: 60px;
            height: 30px;
        }

        .character.sad .mouth {
            border-radius: 55px 55px 0 0;
            border-top: 3px solid #e0e0e0;
            border-bottom: none;
            bottom: 38px;
            width: 50px;
        }

        .character.sad .eyebrow {
            transform: rotate(-12deg);
        }

        .character.sad .eyebrow:first-child {
            transform: rotate(12deg);
        }

        .character.shy .blush {
            opacity: 1;
        }

        .character.shy .pupil {
            left: 0px;
            top: 3px;
        }

        /* Looking at username field (left) */
        .character.looking-username .pupil {
            left: 2px;
            top: 8px;
        }

        /* Looking at password field (down) */
        .character.looking-password .pupil {
            left: 5px;
            top: 10px;
        }

        /* Curious/nervous when hovering toggle */
        .character.curious .pupil {
            left: 8px;
            top: 5px;
        }

        .character.curious .eyebrow {
            transform: translateY(-2px);
        }

        /* Mouse tracking */
        .character.tracking .pupil {
            transition: all 0.15s ease-out;
        }

        .character.looking .pupil {
            left: 10px;
            top: 8px;
        }

        /* Fireworks */
        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            animation: firework-burst 0.6s ease-out forwards;
        }

        @keyframes firework-burst {
            to {
                transform: translate(var(--x), var(--y));
                opacity: 0;
            }
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, -50%); }
            50% { transform: translate(-50%, -54%); }
        }

        .character.celebrate {
            animation: bounce 0.4s ease-in-out 2;
        }

        @keyframes shake {
            0%, 100% { transform: translate(-50%, -50%); }
            25% { transform: translate(-54%, -50%); }
            75% { transform: translate(-46%, -50%); }
        }

        .character.shake-head {
            animation: shake 0.4s ease-in-out;
        }

        .skip-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: white;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .skip-link:hover {
            opacity: 1;
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #b0b0b0;
        }

        .toggle-form a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.4);
        }

        .toggle-form a:hover {
            color: #c4b5fd;
            text-decoration: underline;
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="left-section">
            <!-- Login Form -->
            <div class="form-container active" id="loginForm">
                <div class="title">Welcome Back</div>
                <div class="subtitle">Please login to continue to SynchroEdit</div>

                <div class="input-group">
                    <label for="loginUsername">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username">
                    </div>
                </div>

                <div class="input-group">
                    <label for="loginPassword">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
                    </div>
                    <span class="password-toggle" id="loginPasswordToggle"><i class="fas fa-eye"></i></span>
                </div>

                <button class="login-btn" id="loginBtn">Login</button>

                <div class="status-message" id="loginStatusMessage"></div>

                <div class="toggle-form">
                    Don't have an account? <a id="showSignup">Create Account</a>
                </div>
            </div>

            <!-- Signup Form -->
            <div class="form-container" id="signupForm">
                <div class="title">Create Account</div>
                <div class="subtitle">Join SynchroEdit today</div>

                <div class="input-group">
                    <label for="signupUsername">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="signupUsername" placeholder="Choose a username" autocomplete="off">
                    </div>
                </div>

                <div class="input-group">
                    <label for="signupEmail">Email Address</label>
                    <div class="input-wrapper">
                        <input type="email" id="signupEmail" placeholder="Enter your email" autocomplete="email">
                    </div>
                </div>

                <div class="input-group">
                    <label for="signupPassword">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="signupPassword" placeholder="Create a password" autocomplete="new-password">
                    </div>
                    <span class="password-toggle" id="signupPasswordToggle"><i class="fas fa-eye"></i></span>
                </div>

                <div class="input-group">
                    <label for="signupPasswordConfirm">Confirm Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="signupPasswordConfirm" placeholder="Confirm your password" autocomplete="new-password">
                    </div>
                </div>

                <button class="login-btn" id="signupBtn">Create Account</button>

                <div class="status-message" id="signupStatusMessage"></div>

                <div class="toggle-form">
                    Already have an account? <a id="showLogin">Login</a>
                </div>
            </div>
        </div>

        <div class="right-section">
            <div class="character-container">
                <div class="character" id="character">
                    <div class="head">
                        <div class="eyebrows">
                            <div class="eyebrow"></div>
                            <div class="eyebrow"></div>
                        </div>
                        <div class="eyes">
                            <div class="eye">
                                <div class="pupil"></div>
                            </div>
                            <div class="eye">
                                <div class="pupil"></div>
                            </div>
                        </div>
                        <div class="mouth"></div>
                        <div class="blush left"></div>
                        <div class="blush right"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a href="index.html" class="skip-link">Skip login →</a>

    <!-- Email Verification Modal -->
    <div id="emailVerificationModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10001; align-items: center; justify-content: center;">
        <div style="background: linear-gradient(135deg, #0a0a0a 0%, #1a0f2e 50%, #0d0d0d 100%); padding: 40px; border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 0 40px rgba(139, 92, 246, 0.4); border: 1px solid #8b5cf6; text-align: center;">
            <h2 style="color: #a78bfa; margin-bottom: 16px; font-size: 20px;">Verify Your Email</h2>
            <p style="color: #b0b0b0; margin-bottom: 24px; font-size: 14px;">We've sent a verification code to your email. Enter it below:</p>
            
            <div style="margin-bottom: 24px;">
                <input type="text" id="verificationCode" placeholder="Enter 6-digit code" style="width: 100%; padding: 12px; border: 1px solid #8b5cf6; border-radius: 6px; background: #1a1a1a; color: #e0e0e0; font-size: 16px; text-align: center; letter-spacing: 4px; outline: none;" maxlength="6">
            </div>
            
            <button id="verifyCodeBtn" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #8b5cf6, #a78bfa); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; margin-bottom: 12px;">Verify Code</button>
            <button id="resendCodeBtn" style="width: 100%; padding: 12px; background: transparent; color: #8b5cf6; border: 1px solid #8b5cf6; border-radius: 6px; cursor: pointer; font-weight: 600;">Resend Code</button>
            
            <div id="verificationMessage" style="margin-top: 16px; font-size: 13px;"></div>
        </div>
    </div>

    <script>
        // Elements - Signup
        const signupForm = document.getElementById('signupForm');
        const signupUsernameInput = document.getElementById('signupUsername');
        const signupEmailInput = document.getElementById('signupEmail');
        const signupPasswordInput = document.getElementById('signupPassword');
        const signupPasswordConfirm = document.getElementById('signupPasswordConfirm');
        const signupPasswordToggle = document.getElementById('signupPasswordToggle');
        const signupBtn = document.getElementById('signupBtn');
        const signupStatusMessage = document.getElementById('signupStatusMessage');

        // Email Verification
        const emailVerificationModal = document.getElementById('emailVerificationModal');
        const verificationCode = document.getElementById('verificationCode');
        const verifyCodeBtn = document.getElementById('verifyCodeBtn');
        const resendCodeBtn = document.getElementById('resendCodeBtn');
        const verificationMessage = document.getElementById('verificationMessage');
        let pendingSignupData = null;

        // Elements - Login
        const loginForm = document.getElementById('loginForm');
        const loginUsernameInput = document.getElementById('loginUsername');
        const loginPasswordInput = document.getElementById('loginPassword');
        const loginPasswordToggle = document.getElementById('loginPasswordToggle');
        const loginBtn = document.getElementById('loginBtn');
        const loginStatusMessage = document.getElementById('loginStatusMessage');

        // Suppress Edge autofill popup by handling mousedown/mouseover on password fields
        [loginPasswordInput].forEach(field => {
            field.addEventListener('mousedown', (e) => {
                if (e.button === 0) { // Left click only
                    e.preventDefault();
                    field.focus();
                    e.target.setSelectionRange(e.target.value.length, e.target.value.length);
                }
            }, true);
            field.addEventListener('mouseover', (e) => {
                e.preventDefault();
            }, true);
        });

        // Suppress Edge autofill popup by handling mousedown/mouseover on password fields
        [signupPasswordInput, signupPasswordConfirm].forEach(field => {
            field.addEventListener('mousedown', (e) => {
                if (e.button === 0) { // Left click only
                    e.preventDefault();
                    field.focus();
                    e.target.setSelectionRange(e.target.value.length, e.target.value.length);
                }
            }, true);
            field.addEventListener('mouseover', (e) => {
                e.preventDefault();
            }, true);
        });

        // Toggle buttons
        const showSignup = document.getElementById('showSignup');
        const showLogin = document.getElementById('showLogin');

        // Debounce focus updates to prevent double-eye from rapid autofill events
        let focusDebounceTimer = null;
        const debounceFocusUpdate = (callback, delay = 150) => {
            clearTimeout(focusDebounceTimer);
            focusDebounceTimer = setTimeout(callback, delay);
        };

        // Character
        const character = document.getElementById('character');

        let loginPasswordVisible = false;
        let signupPasswordVisible = false;
        let currentEmotion = 'neutral';
        let activeForm = 'login';
        let isTrackingMouse = false;
        let mouseTrackingTimeout = null;

        // Set emotion
        function setEmotion(emotion) {
            resetPupils();
            character.className = 'character ' + emotion;
            currentEmotion = emotion;
            isTrackingMouse = false;
        }

        // Mouse tracking for pupils when idle
        function enableMouseTracking() {
            if (currentEmotion === 'neutral') {
                isTrackingMouse = true;
                character.classList.add('tracking');
            }
        }

        document.addEventListener('mousemove', (e) => {
            if (!isTrackingMouse || currentEmotion !== 'neutral') return;
            
            const rightSection = document.querySelector('.right-section');
            const rect = rightSection.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            const deltaX = e.clientX - centerX;
            const deltaY = e.clientY - centerY;
            
            // Constrain movement to a smaller range
            const maxDistance = 3;
            const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
            
            // Calculate normalized position with smoother falloff
            const factor = Math.min(distance / 200, 1);
            const normalizedX = (deltaX / distance) * factor * maxDistance;
            const normalizedY = (deltaY / distance) * factor * maxDistance;
            
            document.querySelectorAll('.pupil').forEach(pupil => {
                pupil.style.transform = `translate(${normalizedX}px, ${normalizedY}px)`;
            });
        });

        // Reset pupil position when not tracking
        function resetPupils() {
            document.querySelectorAll('.pupil').forEach(pupil => {
                pupil.style.transform = '';
                pupil.style.left = '';
                pupil.style.top = '';
                pupil.style.transition = 'none';
            });
            setTimeout(() => {
                document.querySelectorAll('.pupil').forEach(pupil => {
                    pupil.style.transition = '';
                });
            }, 0);
        }

        // Create fireworks
        function createFireworks() {
            const container = document.querySelector('.right-section');
            const colors = ['#FF1744', '#FFD600', '#00E676', '#FF6E40', '#2979FF'];
            
            function createBurst() {
                const x = Math.random() * 100 - 50;
                const y = -150 + Math.random() * 50;
                
                for (let i = 0; i < 12; i++) {
                    const firework = document.createElement('div');
                    firework.className = 'firework';
                    firework.style.background = colors[Math.floor(Math.random() * colors.length)];
                    firework.style.left = '50%';
                    firework.style.top = '30%';
                    
                    const angle = (360 / 12) * i;
                    const distance = 80;
                    const fx = Math.cos(angle * Math.PI / 180) * distance;
                    const fy = Math.sin(angle * Math.PI / 180) * distance;
                    
                    firework.style.setProperty('--x', fx + 'px');
                    firework.style.setProperty('--y', fy + 'px');
                    
                    container.appendChild(firework);
                    
                    setTimeout(() => firework.remove(), 600);
                }
            }
            
            createBurst();
            setTimeout(createBurst, 300);
            setTimeout(createBurst, 600);
        }

        // Form toggle
        showSignup.addEventListener('click', () => {
            resetPupils();
            loginForm.classList.remove('active');
            signupForm.classList.add('active');
            activeForm = 'signup';
            setEmotion('neutral');
            signupUsernameInput.focus();
        });

        showLogin.addEventListener('click', () => {
            resetPupils();
            signupForm.classList.remove('active');
            loginForm.classList.add('active');
            activeForm = 'login';
            setEmotion('neutral');
            loginUsernameInput.focus();
        });

        // Username input handlers - Login
        loginUsernameInput.addEventListener('input', () => {
            // Don't update emotion if password field is focused
            if (loginPasswordInput.matches(':focus')) {
                return;
            }
            const username = loginUsernameInput.value.trim();
            if (loginPasswordVisible) {
                setEmotion('shy');
            } else if (username === 'k9-Vortex') {
                setEmotion('happy');
            } else if (username.length > 0) {
                setEmotion('looking-username');
            } else {
                setEmotion('neutral');
            }
        });

        loginUsernameInput.addEventListener('focus', () => {
            resetPupils();
            const username = loginUsernameInput.value.trim();
            if (loginPasswordVisible) {
                setEmotion('shy');
            } else if (username === 'k9-Vortex') {
                setEmotion('happy');
            } else {
                setEmotion('looking-username');
            }
        });

        loginUsernameInput.addEventListener('blur', () => {
            if (!loginPasswordInput.matches(':focus')) {
                resetPupils();
                setEmotion('neutral');
                setTimeout(enableMouseTracking, 500);
            }
        });

        // Username input handlers - Signup
        signupUsernameInput.addEventListener('input', () => {
            // Don't update emotion if password field is focused
            if (signupPasswordInput.matches(':focus')) {
                return;
            }
            const username = signupUsernameInput.value.trim();
            if (signupPasswordVisible) {
                setEmotion('shy');
            } else if (username === 'k9-Vortex') {
                setEmotion('happy');
            } else if (username.length > 0) {
                setEmotion('looking-username');
            } else {
                setEmotion('neutral');
            }
        });

        signupUsernameInput.addEventListener('focus', () => {
            resetPupils();
            const username = signupUsernameInput.value.trim();
            if (signupPasswordVisible) {
                setEmotion('shy');
            } else if (username === 'k9-Vortex') {
                setEmotion('happy');
            } else {
                setEmotion('looking-username');
            }
        });

        signupUsernameInput.addEventListener('blur', () => {
            if (!signupPasswordInput.matches(':focus')) {
                resetPupils();
                setEmotion('neutral');
                setTimeout(enableMouseTracking, 500);
            }
        });

        // Password input handlers
        loginPasswordInput.addEventListener('input', () => {
            resetPupils();
            if (loginPasswordVisible) {
                setEmotion('shy');
            } else {
                setEmotion('looking-password');
            }
        });

        loginPasswordInput.addEventListener('focus', () => {
            loginPasswordToggle.style.visibility = 'hidden';
            debounceFocusUpdate(() => {
                isTrackingMouse = false;
                character.classList.remove('tracking');
                resetPupils();
                if (loginPasswordVisible) {
                    setEmotion('shy');
                } else {
                    setEmotion('looking-password');
                }
            });
        });

        loginPasswordInput.addEventListener('blur', () => {
            loginPasswordToggle.style.visibility = 'visible';
            resetPupils();
            setEmotion('neutral');
            setTimeout(enableMouseTracking, 500);
        });

        // Caps lock detection
        loginPasswordInput.addEventListener('keyup', (e) => {
            if (e.getModifierState && e.getModifierState('CapsLock')) {
                if (!loginPasswordVisible) {
                    // Quick surprised look
                    const temp = currentEmotion;
                    setEmotion('curious');
                    setTimeout(() => setEmotion(temp), 300);
                }
            }
        });

        signupPasswordInput.addEventListener('input', () => {
            resetPupils();
            if (signupPasswordVisible) {
                setEmotion('shy');
            } else {
                setEmotion('looking-password');
            }
        });

        signupPasswordInput.addEventListener('focus', () => {
            signupPasswordToggle.style.visibility = 'hidden';
            debounceFocusUpdate(() => {
                isTrackingMouse = false;
                character.classList.remove('tracking');
                resetPupils();
                if (signupPasswordVisible) {
                    setEmotion('shy');
                } else {
                    setEmotion('looking-password');
                }
            });
        });

        signupPasswordInput.addEventListener('blur', () => {
            signupPasswordToggle.style.visibility = 'visible';
            resetPupils();
            setEmotion('neutral');
            setTimeout(enableMouseTracking, 500);
        });

        // Caps lock detection
        signupPasswordInput.addEventListener('keyup', (e) => {
            if (e.getModifierState && e.getModifierState('CapsLock')) {
                if (!signupPasswordVisible) {
                    const temp = currentEmotion;
                    setEmotion('curious');
                    setTimeout(() => setEmotion(temp), 300);
                }
            }
        });

        signupPasswordConfirm.addEventListener('input', () => {
            resetPupils();
            if (signupPasswordVisible) {
                setEmotion('shy');
            } else {
                setEmotion('looking-password');
            }
        });

        signupPasswordConfirm.addEventListener('focus', () => {
            resetPupils();
            if (signupPasswordVisible) {
                setEmotion('shy');
            } else {
                setEmotion('looking-password');
            }
        });

        signupPasswordConfirm.addEventListener('blur', () => {
            resetPupils();
            setEmotion('neutral');
            setTimeout(enableMouseTracking, 500);
        });

        signupPasswordConfirm.addEventListener('keyup', (e) => {
            if (e.getModifierState && e.getModifierState('CapsLock')) {
                if (!signupPasswordVisible) {
                    const temp = currentEmotion;
                    setEmotion('curious');
                    setTimeout(() => setEmotion(temp), 300);
                }
            }
        });

        // Password toggle - LOGIN
        loginPasswordToggle.addEventListener('mouseenter', () => {
            if (loginPasswordInput.matches(':focus') || loginPasswordInput.value) {
                setEmotion('curious');
            }
        });

        loginPasswordToggle.addEventListener('mouseleave', () => {
            if (loginPasswordInput.matches(':focus')) {
                setEmotion(loginPasswordVisible ? 'shy' : 'looking-password');
            } else if (currentEmotion === 'curious') {
                setEmotion('neutral');
                setTimeout(enableMouseTracking, 500);
            }
        });

        loginPasswordToggle.addEventListener('click', () => {
            loginPasswordVisible = !loginPasswordVisible;
            loginPasswordInput.type = loginPasswordVisible ? 'text' : 'password';
            loginPasswordToggle.textContent = loginPasswordVisible ? '🙈' : '👁';
            
            // Immediate reaction
            if (loginPasswordVisible) {
                setEmotion('shy');
            } else {
                setEmotion('looking-password');
            }
        });

        // Password toggle - SIGNUP
        signupPasswordToggle.addEventListener('mouseenter', () => {
            if (signupPasswordInput.matches(':focus') || signupPasswordInput.value) {
                setEmotion('curious');
            }
        });

        signupPasswordToggle.addEventListener('mouseleave', () => {
            if (signupPasswordInput.matches(':focus')) {
                setEmotion(signupPasswordVisible ? 'shy' : 'looking-password');
            } else if (currentEmotion === 'curious') {
                setEmotion('neutral');
                setTimeout(enableMouseTracking, 500);
            }
        });

        signupPasswordToggle.addEventListener('click', () => {
            signupPasswordVisible = !signupPasswordVisible;
            signupPasswordInput.type = signupPasswordVisible ? 'text' : 'password';
            signupPasswordToggle.textContent = signupPasswordVisible ? '🙈' : '👁';
            
            // Immediate reaction
            if (signupPasswordVisible) {
                setEmotion('shy');
            } else {
                setEmotion('looking-password');
            }
        });

        // Login handler
        async function handleLogin() {
            const username = loginUsernameInput.value.trim();
            const password = loginPasswordInput.value;

            if (!username || !password) {
                loginStatusMessage.textContent = '✗ Please fill in all fields';
                loginStatusMessage.className = 'status-message error';
                setEmotion('sad');
                return;
            }

            // Development mode: accept K9-Vortex / password123
            if (username === 'K9-Vortex' && password === 'password123') {
                setEmotion('celebrate');
                createFireworks();
                loginStatusMessage.textContent = '✓ Login successful!';
                loginStatusMessage.className = 'status-message success';
                
                localStorage.setItem('synchroEditToken', 'dev-token-' + Date.now());
                localStorage.setItem('synchroEditUser', username);
                
                setTimeout(() => {
                    const params = new URLSearchParams(window.location.search);
                    const docId = params.get('doc');
                    const redirectUrl = docId ? `index.html?doc=${docId}` : 'index.html';
                    window.location.href = redirectUrl;
                }, 3000);
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    setEmotion('celebrate');
                    createFireworks();
                    loginStatusMessage.textContent = '✓ Login successful!';
                    loginStatusMessage.className = 'status-message success';
                    
                    localStorage.setItem('synchroEditToken', data.token);
                    localStorage.setItem('synchroEditUser', data.username);
                    
                    const params = new URLSearchParams(window.location.search);
                    const docId = params.get('doc');
                    const redirectUrl = docId ? `index.html?doc=${docId}` : 'index.html';
                    
                    setTimeout(() => { window.location.href = redirectUrl; }, 1500);
                } else {
                    setEmotion('shake-head');
                    setTimeout(() => setEmotion('sad'), 400);
                    loginStatusMessage.textContent = '✗ ' + (data.message || 'Login failed');
                    loginStatusMessage.className = 'status-message error';
                }
            } catch (err) {
                loginStatusMessage.textContent = '✗ Server error';
                loginStatusMessage.className = 'status-message error';
            }
        }

        // Signup handler
        async function handleSignup() {
            const username = signupUsernameInput.value.trim();
            const email = signupEmailInput.value.trim();
            const password = signupPasswordInput.value;
            const passwordConfirm = signupPasswordConfirm.value;

            if (!username || !email || !password || !passwordConfirm) {
                signupStatusMessage.textContent = '✗ Please fill in all fields';
                signupStatusMessage.className = 'status-message error';
                setEmotion('sad');
                return;
            }

            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                signupStatusMessage.textContent = '✗ Please enter a valid email';
                signupStatusMessage.className = 'status-message error';
                setEmotion('sad');
                return;
            }

            if (password !== passwordConfirm) {
                signupStatusMessage.textContent = '✗ Passwords do not match';
                signupStatusMessage.className = 'status-message error';
                setEmotion('shake-head');
                setTimeout(() => setEmotion('sad'), 400);
                return;
            }

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store signup data temporarily and show verification modal
                    pendingSignupData = data;
                    signupStatusMessage.textContent = '✓ Check your email for verification code';
                    signupStatusMessage.className = 'status-message success';
                    
                    // Show verification modal
                    emailVerificationModal.style.display = 'flex';
                    verificationCode.focus();
                } else {
                    signupStatusMessage.textContent = '✗ ' + (data.message || 'Signup failed');
                    signupStatusMessage.className = 'status-message error';
                    setEmotion('sad');
                }
            } catch (err) {
                console.error('Signup error:', err);
                signupStatusMessage.textContent = '✗ Network error. Please try again.';
                signupStatusMessage.className = 'status-message error';
                setEmotion('sad');
            }
        }

        // Verify email code
        verifyCodeBtn.addEventListener('click', async () => {
            const code = verificationCode.value.trim();
            
            if (!code || !pendingSignupData) {
                verificationMessage.textContent = '✗ Please enter the code';
                verificationMessage.style.color = '#ef4444';
                return;
            }

            try {
                const response = await fetch('/api/auth/verify-email', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: pendingSignupData.email,
                        verificationCode: code 
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    setEmotion('celebrate');
                    createFireworks();
                    verificationMessage.textContent = '✓ Email verified!';
                    verificationMessage.style.color = '#10b981';
                    
                    // Save token and redirect
                    localStorage.setItem('synchroEditToken', pendingSignupData.token);
                    localStorage.setItem('synchroEditUser', pendingSignupData.username);
                    
                    setTimeout(() => {
                        const params = new URLSearchParams(window.location.search);
                        const docId = params.get('doc');
                        if (docId) {
                            window.location.href = `index.html?doc=${docId}`;
                        } else {
                            window.location.href = 'index.html';
                        }
                    }, 1500);
                } else {
                    verificationMessage.textContent = '✗ Invalid code. Please try again.';
                    verificationMessage.style.color = '#ef4444';
                    setEmotion('sad');
                }
            } catch (err) {
                console.error('Verification error:', err);
                verificationMessage.textContent = '✗ Network error. Please try again.';
                verificationMessage.style.color = '#ef4444';
            }
        });

        // Resend code
        resendCodeBtn.addEventListener('click', async () => {
            if (!pendingSignupData) return;

            try {
                const response = await fetch('/api/auth/resend-code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingSignupData.email })
                });

                if (response.ok) {
                    verificationMessage.textContent = '✓ Code resent to your email';
                    verificationMessage.style.color = '#10b981';
                    verificationCode.value = '';
                    verificationCode.focus();
                } else {
                    verificationMessage.textContent = '✗ Failed to resend code';
                    verificationMessage.style.color = '#ef4444';
                }
            } catch (err) {
                console.error('Resend error:', err);
                verificationMessage.textContent = '✗ Network error';
                verificationMessage.style.color = '#ef4444';
            }
        });

        verificationCode.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') verifyCodeBtn.click();
        });

        loginBtn.addEventListener('click', handleLogin);
        signupBtn.addEventListener('click', handleSignup);

        // Enter key handlers
        loginPasswordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogin(); });
        signupPasswordConfirm.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSignup(); });

        // Blinking animation
        function blink() {
            const eyes = document.querySelectorAll('.eye');
            eyes.forEach(eye => { eye.style.height = '2px'; });
            setTimeout(() => {
                eyes.forEach(eye => { eye.style.height = '20px'; });
            }, 150);
        }

        function startBlinking() {
            setTimeout(() => { blink(); startBlinking(); }, 2000 + Math.random() * 3000);
        }

        startBlinking();
        enableMouseTracking();
        loginUsernameInput.focus();
    </script>
</body>
</html>
