<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynchroEdit - Set New Password</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { color-scheme: dark; }
      body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #000000 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }
      .login-container {
        background: #0d0d0d;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(139, 92, 246, 0.4), 0 0 80px rgba(167, 139, 250, 0.2);
        border: 1px solid #2a2a2a;
        display: flex;
        flex-direction: column;
        width: 450px;
        padding: 40px;
        text-align: center;
      }
      .title {
        font-size: 28px;
        font-weight: bold;
        color: #a78bfa;
        margin-bottom: 10px;
      }
      .subtitle {
        font-size: 14px;
        color: #b0b0b0;
        margin-bottom: 30px;
      }
      .input-group {
        margin-bottom: 25px;
        text-align: left;
        position: relative;
      }
      .input-group label {
        display: block;
        font-size: 12px;
        color: #e0e0e0;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .input-group input {
        width: 100%;
        padding: 15px;
        font-size: 14px;
        border: 1px solid #2a2a2a;
        background: #1a1a1a;
        border-radius: 8px;
        outline: none;
        transition: all 0.3s;
        color: #e0e0e0;
      }
      .input-group input:focus {
        background: #0d0d0d;
        border-color: #8b5cf6;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
      }
      .action-btn {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        background: #8b5cf6;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
      }
      .action-btn:hover {
        background: #a78bfa;
        box-shadow: 0 0 35px rgba(167, 139, 250, 0.6);
      }
      .status-message {
        margin-top: 20px;
        font-size: 14px;
        min-height: 20px;
      }
      .status-message.success { color: #4caf50; }
      .status-message.error { color: #f44336; }
      .back-link {
        margin-top: 25px;
        font-size: 14px;
        color: #b0b0b0;
      }
      .back-link a {
        color: #a78bfa;
        text-decoration: none;
        cursor: pointer;
      }
      .back-link a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="title">New Password</div>
      <div class="subtitle">Secure your account with a strong password</div>

      <div class="input-group">
        <label for="password">New Password</label>
        <input type="password" id="password" placeholder="Minimum 8 chars, numbers & symbols" autocomplete="new-password" />
      </div>

      <div class="input-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password" />
      </div>

      <button class="action-btn" id="resetBtn">Set New Password</button>
      <div class="status-message" id="statusMessage"></div>
    </div>

    <script type="module">
      import { Network } from '../js/core/network.js';
      import { Auth } from '../js/ui/auth.js';

      const passwordInput = document.getElementById('password');
      const confirmInput = document.getElementById('confirmPassword');
      const resetBtn = document.getElementById('resetBtn');
      const statusMessage = document.getElementById('statusMessage');
      
      const token = new URLSearchParams(window.location.search).get('token');

      if (!token) {
          statusMessage.textContent = '✗ Invalid or missing reset token.';
          statusMessage.className = 'status-message error';
          resetBtn.disabled = true;
          document.querySelector('.subtitle').textContent = 'Please request a new link.';
      }

      async function handleReset() {
        const password = passwordInput.value;
        const confirm = confirmInput.value;

        if (!password || !confirm) {
          statusMessage.textContent = 'Please fill in all fields.';
          statusMessage.className = 'status-message error';
          return;
        }

        if (password !== confirm) {
          statusMessage.textContent = '✗ Passwords do not match.';
          statusMessage.className = 'status-message error';
          return;
        }

        // Client-side pre-validation
        const complexityRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])(?=.{8,})/;
        if (!complexityRegex.test(password)) {
            statusMessage.textContent = '✗ Password too weak (Min 8 chars, Upper, Lower, Number, Symbol).';
            statusMessage.className = 'status-message error';
            return;
        }

        resetBtn.disabled = true;
        resetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        statusMessage.textContent = '';

        try {
          const data = await Network.fetchAPI('/api/auth/reset-password', {
            method: 'POST',
            body: JSON.stringify({ token, password })
          });

          statusMessage.textContent = '✓ Password reset! Redirecting...';
          statusMessage.className = 'status-message success';
          
          if (data.token) {
              Auth.setToken(data.token);
          }

          setTimeout(() => {
              window.location.href = '../index.html';
          }, 2000);
        } catch (err) {
          statusMessage.textContent = '✗ ' + (err.message.replace('API error: ', 'Error ') || 'Reset failed.');
          statusMessage.className = 'status-message error';
          resetBtn.disabled = false;
          resetBtn.textContent = 'Set New Password';
        }
      }

      resetBtn.addEventListener('click', handleReset);
    </script>
  </body>
</html>
