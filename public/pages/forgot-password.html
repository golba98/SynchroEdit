<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SynchroEdit - Forgot Password</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html { color-scheme: dark; }
      body {
        font-family: 'Helvetica Neue', Arial, sans-serif;
        background: linear-gradient(135deg, #1a0033 0%, #0d001a 50%, #000000 100%);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
      }
      .login-container {
        background: #0d0d0d;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(139, 92, 246, 0.4), 0 0 80px rgba(167, 139, 250, 0.2);
        border: 1px solid #2a2a2a;
        display: flex;
        flex-direction: column;
        width: 450px;
        padding: 40px;
        text-align: center;
      }
      .title {
        font-size: 28px;
        font-weight: bold;
        color: #a78bfa;
        margin-bottom: 10px;
      }
      .subtitle {
        font-size: 14px;
        color: #b0b0b0;
        margin-bottom: 30px;
      }
      .input-group {
        margin-bottom: 25px;
        text-align: left;
      }
      .input-group label {
        display: block;
        font-size: 12px;
        color: #e0e0e0;
        margin-bottom: 8px;
        font-weight: 500;
      }
      .input-group input {
        width: 100%;
        padding: 15px;
        font-size: 14px;
        border: 1px solid #2a2a2a;
        background: #1a1a1a;
        border-radius: 8px;
        outline: none;
        transition: all 0.3s;
        color: #e0e0e0;
      }
      .input-group input:focus {
        background: #0d0d0d;
        border-color: #8b5cf6;
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
      }
      .action-btn {
        width: 100%;
        padding: 15px;
        font-size: 16px;
        font-weight: bold;
        color: white;
        background: #8b5cf6;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 10px;
      }
      .action-btn:hover {
        background: #a78bfa;
        box-shadow: 0 0 35px rgba(167, 139, 250, 0.6);
      }
      .status-message {
        margin-top: 20px;
        font-size: 14px;
        min-height: 20px;
      }
      .status-message.success { color: #4caf50; }
      .status-message.error { color: #f44336; }
      .back-link {
        margin-top: 25px;
        font-size: 14px;
        color: #b0b0b0;
      }
      .back-link a {
        color: #a78bfa;
        text-decoration: none;
        cursor: pointer;
      }
      .back-link a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="title">Reset Password</div>
      <div class="subtitle">Enter your email to receive a reset link</div>

      <div class="input-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your registered email" autocomplete="email" />
      </div>

      <button class="action-btn" id="sendBtn">Send Reset Link</button>
      <div class="status-message" id="statusMessage"></div>

      <div class="back-link">
        <a href="login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
      </div>
    </div>

    <script>
      const emailInput = document.getElementById('email');
      const sendBtn = document.getElementById('sendBtn');
      const statusMessage = document.getElementById('statusMessage');

      async function handleForgot() {
        const email = emailInput.value.trim();
        if (!email) {
          statusMessage.textContent = 'Please enter your email.';
          statusMessage.className = 'status-message error';
          return;
        }

        sendBtn.disabled = true;
        sendBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
        statusMessage.textContent = '';

        try {
          const response = await fetch('/api/auth/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
          });
          const data = await response.json();

          if (response.ok) {
            statusMessage.textContent = '✓ ' + data.message;
            statusMessage.className = 'status-message success';
            emailInput.value = '';
          } else {
            statusMessage.textContent = '✗ ' + (data.message || 'Failed to send request.');
            statusMessage.className = 'status-message error';
          }
        } catch (err) {
          statusMessage.textContent = '✗ Network error.';
          statusMessage.className = 'status-message error';
        } finally {
          sendBtn.disabled = false;
          sendBtn.textContent = 'Send Reset Link';
        }
      }

      sendBtn.addEventListener('click', handleForgot);
      emailInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleForgot();
      });
    </script>
  </body>
</html>
